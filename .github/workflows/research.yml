name: Unwatched AI Research
on: 
  workflow_dispatch: 
  schedule:
    - cron: '0 2 * * *' 
  push:
    branches: [ main ]

jobs:
  run-scout:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install google-genai requests
        
      - name: Run Researcher
        env:
          # Mapping your new 2026 secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python researcher.py
        
      - name: Commit and Push Research
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Unwatched Analyst"
          # Ensure market_research.md exists before adding
          touch market_research.md 
          git add market_research.md
          git commit -m "📈 Updated Market Intelligence: $(date)" || echo "No changes to commit"
          git push
